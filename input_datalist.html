<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input 태그 datalist</title>
</head>

<body>
    <p>가장 귀여운 강아지는??</p>
    <input type="text" list="bichon">
    <datalist id="bichon">
        <option value="구름이"></option>
        <option value="김구름"></option>
        <option value="groomi"></option>
        <option value="kimgroom"></option>
    </datalist>
</body>

</html>
