<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔터티 (Entity)</title>
    <style>
        p {
            font-size: 30px;
        }
    </style>
</head>

<body>
    <!--"-->
    <p>&quot;</p>
    <p>&#34;</p>
    <!--'-->
    <p>&apos;</p>
    <p>&#39;</p>
    <!--오른쪽 열림 부등호-->
    <p>&lt;</p>
    <p>&#60;</p>
    <!--왼쪽 열림 부등호-->
    <p>&gt;</p>
    <p>&#62;</p>
    <!--&-->
    <p>&amp;</p>
    <p>&#38;</p>
    <!--빈 칸-->
    <p>&nbsp;</p>
    <p>&#160;</p>
    <!---->
    <!--£-->
    <p>&pound;</p>
    <p>&#163;</p>
    <!--√-->
    <p>&radic;</p>
    <p>&#8730;</p>
    <!--∞-->
    <p>&infin;</p>
    <p>&#8734;</p>
    <!--↑-->
    <p>&uarr;</p>
    <p>&#8593;</p>
    <!--÷-->
    <p>&divide;</p>
    <p>&#247;</p>
    <!--∑-->
    <p>&sum;</p>
    <p>&#8721;</p>
    <!--이모지 단축키 윈도우 하고 .-->
    <p>😊😊😊 😊😊😊</p>
    <!--빈칸 두개-->
    <p>&ensp;</p>
    <!--빈칸 4개-->
    <p>&emsp;</p>
</body>

</html>
