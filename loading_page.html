<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            /* 배경색 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* 가장 위에 표시 */
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ccc;
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            /* 회전 애니메이션 */
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="spinner"></div> <!-- 애니메이션 요소 -->
    </div>
    <script>
        window.onload = function () {
            setTimeout(function(){
            const loader = document.getElementById('loading');
            loader.style.display = 'none'; // 혹은 fadeOut 효과 적용
            }, 2000);
        };
    </script>
</body>
</html>
